<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundRise — Fueling Startups. Building Futures.</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #111827;
            overflow-x: hidden;
            width: 100%;
        }
        .gradient-text {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-bg-accent {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            top: -200px;
            right: -200px;
            z-index: -1;
        }
        .card-shadow {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: transform 0.3s ease;
        }
        @media (min-width: 768px) {
            .stat-card {
                padding: 1.5rem;
            }
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .btn-primary {
            background: #4F46E5;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }
        .btn-primary:hover {
            background: #4338CA;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }
        .btn-secondary {
            background: white;
            color: #4F46E5;
            border: 1px solid #E5E7EB;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }
        .btn-secondary:hover {
            border-color: #4F46E5;
            background: #F9FAFB;
        }
        .chart-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-out forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .dot-pattern {
            background-image: radial-gradient(#E5E7EB 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .mobile-menu-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s ease-out;
        }
        .step-connector {
            background-image: radial-gradient(#D1D5DB 1px, transparent 1px);
            background-size: 8px 8px;
            height: 2px;
            flex-grow: 1;
        }
        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none; animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Navbar = ({ onLogin, onSignup, onHome }) => {

                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" />
                                    <path d="M2 17L12 22L22 17" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                    <path d="M2 12L12 17L22 12" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

                            <a href="#" className="text-gray-600 font-medium hover:text-indigo-600 transition">For Investors</a>
                            <a href="#" className="text-gray-600 font-medium hover:text-indigo-600 transition">How It Works</a>

                            <button onClick={onSignup} className="btn-primary px-6 py-2.5 text-sm">Sign up</button>

                            <a href="#" className="block px-4 py-2 text-gray-600 font-medium hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition">For Startups</a>
                            <a href="#" className="block px-4 py-2 text-gray-600 font-medium hover:bg-indigo-50 hover:text-indigo-600 rounded-lg transition">For Investors</a>

                            <hr className="border-gray-100" />
                            <div className="flex flex-col gap-3 pt-2">
                                <button onClick={onLogin} className="w-full px-5 py-3 font-semibold text-gray-700 bg-gray-50 rounded-xl border border-gray-100">Log in</button>
                                <button onClick={onSignup} className="w-full btn-primary py-3">Sign up</button>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative px-4 sm:px-8 pt-8 sm:pt-12 pb-12 sm:pb-16 max-w-7xl mx-auto grid lg:grid-cols-2 items-center gap-12 lg:gap-16 overflow-hidden">
                    <div className="hero-bg-accent"></div>
                    <div className="space-y-6 sm:space-y-8 relative z-10 text-center md:text-left">
                        <h1 className="text-4xl sm:text-5xl md:text-6xl xl:text-7xl font-extrabold leading-[1.1] tracking-tight text-gray-900">
                            Fueling Startups.<br />
                            <span className="text-indigo-600">Building Futures.</span>
                        </h1>
                        <p className="text-base sm:text-lg text-gray-500 max-w-md mx-auto md:mx-0 leading-relaxed">
                            FundRise connects innovative startups with the right investors to turn ideas into impactful businesses.
                        </p>
                        <div className="flex flex-col sm:flex-row flex-wrap gap-4 pt-4 justify-center md:justify-start">
                            <button className="btn-primary px-8 py-4 text-base flex items-center justify-center gap-2 w-full sm:w-auto">
                                Get Funding 
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </button>
                            <button className="btn-secondary px-8 py-4 text-base w-full sm:w-auto">Invest in Startups</button>

                        <div className="flex flex-col sm:flex-row items-center gap-4 pt-6 sm:pt-8 justify-center md:justify-start">
                            <div className="flex -space-x-3">

                                    <img key={i} src={`https://i.pravatar.cc/100?u=${i+10}`} className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-white object-cover shadow-sm" alt="Avatar" />

                            <p className="text-xs sm:text-sm text-gray-500 font-medium max-w-[250px] sm:max-w-none">
                                Join <span className="text-indigo-600 font-bold">10,000+</span> startups and <span className="text-indigo-600 font-bold">5,000+</span> investors building the future.

                    </div>
                    <div className="relative pt-8 sm:pt-12 px-2 sm:px-0">
                        <div className="bg-white rounded-[24px] sm:rounded-[32px] p-6 sm:p-8 card-shadow relative z-20 border border-gray-100">
                            <div className="space-y-1 mb-6 sm:mb-8">
                                <p className="text-xs sm:text-sm font-medium text-gray-400 uppercase tracking-wider">Total Funding Raised</p>
                                <div className="flex flex-wrap items-end gap-2 sm:gap-3">

                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="mr-0.5"><polyline points="18 15 12 9 6 15"></polyline></svg>

                                </div>
                            </div>
                            <div className="h-32 sm:h-48 w-full">
                                <svg width="100%" height="100%" viewBox="0 0 400 150" preserveAspectRatio="none">
                                    <defs>
                                        <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                            <stop offset="0%" stopColor="rgba(79, 70, 229, 0.1)" />
                                            <stop offset="100%" stopColor="rgba(79, 70, 229, 0)" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M0,130 C40,120 60,140 100,100 C140,60 180,120 220,80 C260,40 300,100 340,40 L400,20 L400,150 L0,150 Z" fill="url(#gradient)" />
                                    <path className="chart-path" d="M0,130 C40,120 60,140 100,100 C140,60 180,120 220,80 C260,40 300,100 340,40 L400,20" fill="none" stroke="#4F46E5" strokeWidth="4" strokeLinecap="round" />
                                    <circle cx="400" cy="20" r="6" fill="#4F46E5" className="floating" />
                                </svg>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 lg:mt-0">
                            <div className="lg:absolute lg:-bottom-10 lg:-left-12 lg:w-64 floating z-30">
                                <div className="stat-card flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] sm:text-xs font-medium text-gray-400 uppercase tracking-wider">Active Startups</p>
                                        <h3 className="text-lg sm:text-xl font-bold text-gray-900">2,350+</h3>
                                    </div>
                                    <div className="bg-purple-100 p-2 rounded-xl">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" strokeWidth="2.5"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>
                                    </div>
                                </div>
                            </div>
                            <div className="lg:absolute lg:top-1/2 lg:-right-12 lg:w-64 floating z-30" style={{ animationDelay: '1s' }}>
                                <div className="stat-card flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] sm:text-xs font-medium text-gray-400 uppercase tracking-wider">Active Investors</p>
                                        <h3 className="text-lg sm:text-xl font-bold text-gray-900">5,200+</h3>
                                    </div>
                                    <div className="bg-emerald-100 p-2 rounded-xl">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const HowItWorks = () => {
            const steps = [
                { id: 1, title: "Create Profile", desc: "Startups and investors sign up and create their profiles.", bgColor: "bg-indigo-50", numColor: "bg-indigo-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg> },
                { id: 2, title: "Discover & Connect", desc: "Discover opportunities or startups that match your goals.", bgColor: "bg-blue-50", numColor: "bg-blue-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563EB" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> },
                { id: 3, title: "Build & Grow", desc: "Connect, collaborate, and close deals to build the future.", bgColor: "bg-green-50", numColor: "bg-green-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="2"><path d="m11 17 2 2a1 1 0 1 0 3-3"/><path d="m14 14 .5.5a1 1 0 1 0 3-3l-3.88-3.88a2.5 2.5 0 1 0-3.5 3.5l.38.38"/></svg> }
            ];

                <section className="py-12 sm:py-16 px-4 sm:px-8 max-w-7xl mx-auto w-full">
                    <div className="text-center mb-12 space-y-4">
                        <h2 className="text-3xl sm:text-4xl font-extrabold text-gray-900 tracking-tight">How FundRise Works</h2>
                        <p className="text-gray-500 text-base sm:text-lg">Getting funded or investing in the next big thing is simple.</p>
                    </div>
                    <div className="relative">
                        <div className="hidden lg:flex absolute top-12 left-1/2 -translate-x-1/2 w-[60%] items-center z-0">
                            <div className="step-connector"></div>
                            <div className="w-32 h-0"></div>
                            <div className="step-connector"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-16 md:gap-8 lg:gap-12 relative z-10">
                            {steps.map(step => (
                                <div key={step.id} className="flex flex-col items-center text-center group">
                                    <div className={`${step.bgColor} w-24 h-24 sm:w-28 sm:h-28 rounded-3xl flex items-center justify-center mb-8 shadow-sm`}>{step.icon}</div>
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-center gap-3">
                                            <span className={`${step.numColor} w-6 h-6 rounded-full text-white text-xs font-bold flex items-center justify-center`}>{step.id}</span>

                                        <p className="text-gray-500 text-sm leading-relaxed max-w-[240px]">{step.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const FeaturedStartups = () => {
            const startups = [
                { name: "Neurofy", category: "AI/ML", desc: "AI-powered analytics platform for smarter business decisions.", raised: "$1.2M", progress: 60, location: "Bengaluru, India", color: "indigo", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/><path d="M12 6v6l4 2"/></svg> },
                { name: "Finovo", category: "Fintech", desc: "Simplifying financial operations for modern businesses.", raised: "$850K", progress: 42, location: "Mumbai, India", color: "emerald", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 7.5a10 10 0 0 1-10 10.5z"/></svg> },
                { name: "MediCare+", category: "HealthTech", desc: "Healthcare made accessible through technology.", raised: "$2.4M", progress: 80, location: "Delhi, India", color: "pink", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg> },

                        </div>
                        <a href="#" className="text-indigo-600 font-semibold flex items-center justify-center md:justify-start gap-2 hover:gap-3 transition-all">View all startups <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>

            return (
