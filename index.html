<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundRise — Fueling Startups. Building Futures.</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            width: 100%;
        }

        .gradient-text {
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-bg-accent {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            top: -200px;
            right: -200px;
            z-index: -1;
        }

        .card-shadow {
            box-shadow: 0 20px 50px rgba(255, 255, 255, 0.02);
        }

        .stat-card {
            background: #111111;
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        @media (min-width: 768px) {
            .stat-card {
                padding: 1.5rem;
            }
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #4F46E5;
        }

        .btn-primary {
            background: #4F46E5;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-primary:hover {
            background: #4338CA;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-secondary:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
        }

        .chart-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-out forwards;
        }

        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .mobile-menu-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s ease-out;
        }

        .step-connector {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 8px 8px;
            height: 2px;
            flex-grow: 1;
        }

        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(-5%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }

            50% {
                transform: none;
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDuYFgJQQHbWcAohPfQQzNHNS1DsVlzrik",
            authDomain: "foodzo-e04d1.firebaseapp.com",
            projectId: "foodzo-e04d1",
            storageBucket: "foodzo-e04d1.firebasestorage.app",
            messagingSenderId: "955677339108",
            appId: "1:955677339108:web:9e4754c0a335c1af162bf1"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const Navbar = ({ onHome }) => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            const handleScroll = (id) => {
                onHome(); // Ensure we are on home view
                setTimeout(() => {
                    const element = document.getElementById(id);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 100);
                setIsMenuOpen(false);
            };

            const handleHomeClick = (e) => {
                e.preventDefault();
                window.location.reload();
            };

            return (
                <nav className="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-4 sm:px-8 py-4">
                    <div className="max-w-7xl mx-auto flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={handleHomeClick}>
                            <div className="bg-indigo-600 p-1 rounded-lg">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" />
                                    <path d="M2 17L12 22L22 17" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                    <path d="M2 12L12 17L22 12" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                                </svg>
                            </div>
                            <span className="text-2xl font-extrabold tracking-tight text-white">FundRise</span>
                        </div>
                        <div className="hidden lg:flex items-center gap-10">
                            <a href="#" onClick={handleHomeClick} className="text-gray-400 font-medium hover:text-white transition">Home</a>
                            <a href="#platform-roles" onClick={(e) => { e.preventDefault(); handleScroll('platform-roles'); }} className="text-gray-400 font-medium hover:text-white transition">For Startups</a>
                            <a href="#platform-roles" onClick={(e) => { e.preventDefault(); handleScroll('platform-roles'); }} className="text-gray-400 font-medium hover:text-white transition">For Investors</a>
                            <a href="#how-it-works" onClick={(e) => { e.preventDefault(); handleScroll('how-it-works'); }} className="text-gray-400 font-medium hover:text-white transition">How It Works</a>
                        </div>
                        <div className="hidden lg:flex items-center gap-4">
                            <button onClick={() => handleScroll('platform-roles')} className="btn-primary px-8 py-2.5 text-sm">Get Started</button>
                        </div>
                        <button className="lg:hidden p-2 text-gray-400" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            {isMenuOpen ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>}
                        </button>
                    </div>
                    {isMenuOpen && (
                        <div className="lg:hidden absolute top-full left-0 w-full bg-black border-b border-white/5 shadow-xl px-4 py-6 space-y-4 mobile-menu-enter-active">
                            <a href="#" onClick={onHome} className="block px-4 py-2 text-gray-400 font-medium hover:text-white rounded-lg transition">Home</a>
                            <a href="#" onClick={(e) => { e.preventDefault(); handleScroll('platform-roles'); }} className="block px-4 py-2 text-gray-400 font-medium hover:text-white rounded-lg transition">For Startups</a>
                            <a href="#" onClick={(e) => { e.preventDefault(); handleScroll('platform-roles'); }} className="block px-4 py-2 text-gray-400 font-medium hover:text-white rounded-lg transition">For Investors</a>
                            <hr className="border-white/5" />
                            <div className="flex flex-col gap-3 pt-2">
                                <button onClick={() => handleScroll('platform-roles')} className="w-full btn-primary py-3">Get Started</button>
                            </div>
                        </div>
                    )}
                </nav>

            );
        };

        const Hero = () => {
            return (
                <section className="relative px-4 sm:px-8 pt-8 sm:pt-12 pb-12 sm:pb-16 max-w-7xl mx-auto grid lg:grid-cols-2 items-center gap-12 lg:gap-16 overflow-hidden">
                    <div className="hero-bg-accent"></div>
                    <div className="space-y-6 sm:space-y-8 relative z-10 text-center md:text-left">
                        <h1 className="text-4xl sm:text-5xl md:text-6xl xl:text-7xl font-extrabold leading-[1.1] tracking-tight text-white">
                            Fueling Startups.<br />
                            <span className="text-indigo-500">Building Futures.</span>
                        </h1>
                        <p className="text-base sm:text-lg text-gray-400 max-w-md mx-auto md:mx-0 leading-relaxed">
                            FundRise connects innovative startups with the right investors to turn ideas into impactful businesses.
                        </p>
                        <div className="flex flex-col sm:flex-row flex-wrap gap-4 pt-4 justify-center md:justify-start">
                            <button className="btn-primary px-8 py-4 text-base flex items-center justify-center gap-2 w-full sm:w-auto">
                                Get Funding
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </button>
                            <button className="btn-secondary px-8 py-4 text-base w-full sm:w-auto">Invest in Startups</button>
                        </div>
                        <div className="flex flex-col sm:flex-row items-center gap-4 pt-6 sm:pt-8 justify-center md:justify-start">
                            <div className="flex -space-x-3">
                                {[1, 2, 3].map(i => (
                                    <img key={i} src={`https://i.pravatar.cc/100?u=${i + 10}`} className="w-10 h-10 sm:w-12 sm:h-12 rounded-full border-2 border-black object-cover shadow-sm" alt="Avatar" />
                                ))}
                            </div>
                            <p className="text-xs sm:text-sm text-gray-400 font-medium max-w-[250px] sm:max-w-none">
                                Join <span className="text-indigo-500 font-bold">10,000+</span> startups and <span className="text-indigo-500 font-bold">5,000+</span> investors building the future.
                            </p>
                        </div>
                    </div>
                    <div className="relative pt-8 sm:pt-12 px-2 sm:px-0">
                        <div className="bg-[#111111] rounded-[24px] sm:rounded-[32px] p-6 sm:p-8 card-shadow relative z-20 border border-white/5">
                            <div className="space-y-1 mb-6 sm:mb-8">
                                <p className="text-xs sm:text-sm font-medium text-gray-500 uppercase tracking-wider">Total Funding Raised</p>
                                <div className="flex flex-wrap items-end gap-2 sm:gap-3">
                                    <h2 className="text-3xl sm:text-4xl font-extrabold text-white">$52.6M</h2>
                                    <div className="flex items-center text-green-500 text-[10px] sm:text-xs font-bold mb-1 sm:mb-2">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="mr-0.5"><polyline points="18 15 12 9 6 15"></polyline></svg>
                                        32.5%
                                    </div>
                                </div>
                            </div>
                            <div className="h-32 sm:h-48 w-full">
                                <svg width="100%" height="100%" viewBox="0 0 400 150" preserveAspectRatio="none">
                                    <defs>
                                        <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                            <stop offset="0%" stopColor="rgba(79, 70, 229, 0.2)" />
                                            <stop offset="100%" stopColor="rgba(79, 70, 229, 0)" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M0,130 C40,120 60,140 100,100 C140,60 180,120 220,80 C260,40 300,100 340,40 L400,20 L400,150 L0,150 Z" fill="url(#gradient)" />
                                    <path className="chart-path" d="M0,130 C40,120 60,140 100,100 C140,60 180,120 220,80 C260,40 300,100 340,40 L400,20" fill="none" stroke="#4F46E5" strokeWidth="4" strokeLinecap="round" />
                                    <circle cx="400" cy="20" r="6" fill="#4F46E5" className="floating" />
                                </svg>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 lg:mt-0">
                            <div className="lg:absolute lg:-bottom-10 lg:-left-12 lg:w-64 floating z-30">
                                <div className="stat-card flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] sm:text-xs font-medium text-gray-500 uppercase tracking-wider">Active Startups</p>
                                        <h3 className="text-lg sm:text-xl font-bold text-white">2,350+</h3>
                                    </div>
                                    <div className="bg-indigo-500/10 p-2 rounded-xl text-indigo-500">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" /><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" /></svg>
                                    </div>
                                </div>
                            </div>
                            <div className="lg:absolute lg:top-1/2 lg:-right-12 lg:w-64 floating z-30" style={{ animationDelay: '1s' }}>
                                <div className="stat-card flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] sm:text-xs font-medium text-gray-500 uppercase tracking-wider">Active Investors</p>
                                        <h3 className="text-lg sm:text-xl font-bold text-white">5,200+</h3>
                                    </div>
                                    <div className="bg-emerald-500/10 p-2 rounded-xl text-emerald-500">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const PlatformRoles = ({ onAuth }) => {
            const roles = [
                {
                    title: "Startup",
                    desc: "Launch your idea, connect with investors and grow your startup.",
                    bullets: ["Create your profile", "Submit pitch deck", "Get funding"],
                    btnText: "Enter as Startup",
                    role: "startup",
                    color: "blue",
                    icon: <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m12 14 4-4-4-4" /><path d="M3 3.4c3.4 3.4 3.4 7.6 3.4 11.6V21" /><path d="M16 10H8" /></svg>
                },
                {
                    title: "Investor",
                    desc: "Discover promising startups and invest in the future.",
                    bullets: ["Browse startups", "Track Investments", "Manage portfolio"],
                    btnText: "Enter as Investor",
                    role: "investor",
                    color: "emerald",
                    icon: <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20V10" /><path d="M18 20V4" /><path d="M6 20v-4" /></svg>
                },
                {
                    title: "Admin",
                    desc: "Manage platform operations, users and ensure a trusted ecosystem.",
                    bullets: ["User management", "Verify & Approve", "Platform analytics"],
                    btnText: "Enter as Admin",
                    role: "admin",
                    color: "rose",
                    icon: <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg>
                }
            ];

            const colorMap = {
                blue: { border: "border-blue-500/30", glow: "shadow-blue-500/10", text: "text-blue-400", btn: "bg-blue-600 hover:bg-blue-700" },
                emerald: { border: "border-emerald-500/30", glow: "shadow-emerald-500/10", text: "text-emerald-400", btn: "bg-emerald-600 hover:bg-emerald-700" },
                rose: { border: "border-rose-500/30", glow: "shadow-rose-500/10", text: "text-rose-400", btn: "bg-rose-600 hover:bg-rose-700" }
            };

            return (
                <section id="platform-roles" className="py-20 px-4 sm:px-8 max-w-7xl mx-auto w-full">
                    <div className="text-center mb-16 space-y-4">
                        <p className="text-indigo-500 font-bold tracking-widest uppercase text-xs">Build • Connect • Grow</p>
                        <h2 className="text-4xl sm:text-5xl font-extrabold text-white tracking-tight">
                            Connecting Startups, <br />
                            <span className="text-indigo-500">Investors & Administration</span>
                        </h2>
                        <p className="text-gray-400 text-lg">Build, Fund and Manage innovation from one platform.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {roles.map((role, i) => (
                            <div key={i} className={`bg-[#0A0A0A] border ${colorMap[role.color].border} ${colorMap[role.color].glow} rounded-[32px] p-10 flex flex-col items-center text-center hover:scale-[1.02] transition-all shadow-2xl`}>
                                <div className={`${colorMap[role.color].text} mb-8`}>
                                    <div className="relative">
                                        <div className={`absolute inset-0 blur-2xl opacity-20 ${colorMap[role.color].text}`}></div>
                                        {role.icon}
                                    </div>
                                </div>
                                <h3 className="text-3xl font-bold text-white mb-4">{role.title}</h3>
                                <p className="text-gray-400 text-sm mb-10 leading-relaxed">{role.desc}</p>
                                <ul className="w-full space-y-4 mb-10">
                                    {role.bullets.map((bullet, j) => (
                                        <li key={j} className="flex items-center gap-3 text-sm font-medium text-gray-300 text-left">
                                            <svg className={`shrink-0 ${colorMap[role.color].text}`} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12" /></svg>
                                            {bullet}
                                        </li>
                                    ))}
                                </ul>
                                <button
                                    onClick={() => onAuth(role.role === 'admin' ? 'admin-login' : 'login', role.role)}
                                    className={`w-full ${colorMap[role.color].btn} text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all`}
                                >
                                    {role.btnText}
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>
                                </button>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const HowItWorks = () => {
            const steps = [
                { id: 1, title: "Create Profile", desc: "Startups and investors sign up and create their profiles.", numColor: "bg-indigo-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /></svg> },
                { id: 2, title: "Discover & Connect", desc: "Discover opportunities or startups that match your goals.", numColor: "bg-blue-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2563EB" strokeWidth="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg> },
                { id: 3, title: "Build & Grow", desc: "Connect, collaborate, and close deals to build the future.", numColor: "bg-green-600", icon: <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" strokeWidth="2"><path d="m11 17 2 2a1 1 0 1 0 3-3" /><path d="m14 14 .5.5a1 1 0 1 0 3-3l-3.88-3.88" /></svg> }
            ];
            return (
                <section id="how-it-works" className="py-12 sm:py-16 px-4 sm:px-8 max-w-7xl mx-auto w-full">
                    <div className="text-center mb-12 space-y-4">
                        <h2 className="text-3xl sm:text-4xl font-extrabold text-white tracking-tight">How FundRise Works</h2>
                        <p className="text-gray-400 text-base sm:text-lg">Getting funded or investing in the next big thing is simple.</p>
                    </div>
                    <div className="relative">
                        <div className="hidden lg:flex absolute top-12 left-1/2 -translate-x-1/2 w-[60%] items-center z-0">
                            <div className="step-connector"></div>
                            <div className="w-32 h-0"></div>
                            <div className="step-connector"></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-16 md:gap-8 lg:gap-12 relative z-10">
                            {steps.map(step => (
                                <div key={step.id} className="flex flex-col items-center text-center group">
                                    <div className="bg-white/5 w-24 h-24 sm:w-28 sm:h-28 rounded-3xl flex items-center justify-center mb-8 border border-white/5 shadow-sm">{step.icon}</div>
                                    <div className="space-y-4">
                                        <div className="flex items-center justify-center gap-3">
                                            <span className={`${step.numColor} w-6 h-6 rounded-full text-white text-xs font-bold flex items-center justify-center`}>{step.id}</span>
                                            <h3 className="text-xl font-bold text-white">{step.title}</h3>
                                        </div>
                                        <p className="text-gray-500 text-sm leading-relaxed max-w-[240px]">{step.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const FeaturedStartups = () => {
            const startups = [

                        <div className="bg-[#111111] rounded-[24px] sm:rounded-[32px] p-6 sm:p-12 shadow-2xl w-full max-w-md border border-white/5">

                                <div className="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-500 text-xs font-bold text-center">

                            <div className="mb-10">
                                <button
                                    onClick={handleGoogleSignUp}

                                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" /><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" /><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05" /><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" /></svg>
                                    {loading ? 'Processing...' : 'Continue with Google'}
                                </button>
                            </div>
                            <div className="flex items-center gap-4 mb-10">
                                <div className="flex-1 h-[1px] bg-white/5"></div>
                                <span className="text-gray-600 font-bold text-xs uppercase tracking-widest">or</span>
                                <div className="flex-1 h-[1px] bg-white/5"></div>
                            </div>
                            <form className="space-y-6" onSubmit={handleSignUp}>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400">Full name</label>
                                    <div className="relative">
                                        <input
                                            type="text"
                                            placeholder="Enter your full name"
                                            value={fullName}
                                            onChange={(e) => setFullName(e.target.value)}
                                            required
                                            className="w-full bg-white/5 border border-white/5 px-6 py-4 rounded-2xl text-white focus:outline-none focus:border-indigo-500 transition-all pr-12"
                                        />
                                        <svg className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400">Email address</label>
                                    <div className="relative">
                                        <input
                                            type="email"
                                            placeholder="Enter your email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            required
                                            className="w-full bg-white/5 border border-white/5 px-6 py-4 rounded-2xl text-white focus:outline-none focus:border-indigo-500 transition-all pr-12"
                                        />
                                        <svg className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" /><polyline points="22,6 12,13 2,6" /></svg>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400">Password</label>
                                    <div className="relative">
                                        <input
                                            type="password"
                                            placeholder="Create a password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            required
                                            className="w-full bg-white/5 border border-white/5 px-6 py-4 rounded-2xl text-white focus:outline-none focus:border-indigo-500 transition-all pr-12"
                                        />
                                        <svg className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400">Confirm password</label>
                                    <div className="relative">
                                        <input
                                            type="password"
                                            placeholder="Confirm your password"
                                            value={confirmPassword}
                                            onChange={(e) => setConfirmPassword(e.target.value)}
                                            required
                                            className="w-full bg-white/5 border border-white/5 px-6 py-4 rounded-2xl text-white focus:outline-none focus:border-indigo-500 transition-all pr-12"
                                        />
                                        <svg className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /><line x1="1" y1="1" x2="23" y2="23" /></svg>
                                    </div>
                                    <p className="text-[10px] text-gray-500 font-medium">Password must be at least 8 characters long and include uppercase, lowercase, number, and special character.</p>
                                </div>
                                <label className="flex items-start gap-3 cursor-pointer group pt-2">
                                    <div className="w-5 h-5 rounded-md bg-indigo-600 flex items-center justify-center shrink-0 mt-0.5">
                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12" /></svg>
                                    </div>
                                    <span className="text-xs font-bold text-gray-400 leading-tight">I agree to the <a href="#" className="text-indigo-500">Terms of Use</a> and <a href="#" className="text-indigo-500">Privacy Policy</a></span>
                                </label>
                                <button
                                    disabled={loading}
                                    className="w-full btn-primary py-5 rounded-[20px] font-bold text-lg shadow-xl shadow-indigo-600/20 transition-all mt-4 disabled:opacity-50"
                                >
                                    {loading ? 'Creating Account...' : 'Sign up'}
                                </button>
                            </form>
                        </div>
                        <p className="mt-8 text-sm font-bold text-gray-500">Already have an account? <button onClick={onLogin} className="text-indigo-500 hover:underline">Log in</button></p>

                        <div className="mt-20 sm:mt-32 max-w-5xl w-full grid grid-cols-1 md:grid-cols-2 items-center gap-16 md:gap-20 text-center md:text-left">
                            <div className="space-y-10 sm:space-y-12">
                                <h3 className="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Why Join FundRise?</h3>
                                <div className="space-y-8 sm:space-y-10">
                                    {content.features.map((f, i) => (
                                        <div key={i} className="flex flex-col sm:flex-row items-center sm:items-start gap-4 sm:gap-6">
                                            <div className={`bg-${f.color}-500/10 w-14 h-14 sm:w-16 sm:h-16 rounded-2xl flex items-center justify-center shrink-0`}>
                                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" className={`text-${f.color}-500`} strokeWidth="2">
                                                    {f.color === 'indigo' && <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>}
                                                    {f.color === 'emerald' && <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />}
                                                    {f.color === 'blue' && <><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" /><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" /></>}
                                                </svg>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-base sm:text-lg text-white">{f.title}</h4>
                                                <p className="text-gray-500 text-sm">{f.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="relative flex justify-center order-first md:order-last">
                                <div className="w-[250px] h-[250px] sm:w-[450px] sm:h-[450px] bg-indigo-500/5 rounded-full absolute -z-10 blur-3xl opacity-50"></div>
                                <img src="https://cdni.iconscout.com/illustration/premium/thumb/startup-business-launch-4439169-3725516.png" className="w-48 sm:w-full max-w-[400px] animate-bounce-slow" />
                            </div>
                        </div>
                    </main>
                    <div className="bg-black border-t border-white/5 py-10 px-6 sm:px-12">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <p className="text-sm text-gray-600 font-bold">© 2024 FundRise. All rights reserved.</p>
                            <div className="flex gap-8">
                                <a href="#" className="text-sm text-gray-600 font-bold hover:text-indigo-500">Privacy Policy</a>
                                <a href="#" className="text-sm text-gray-600 font-bold hover:text-indigo-500">Terms of Use</a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        const StartupForm = ({ onBack, onComplete }) => {
            const [formData, setFormData] = useState({
                startupName: '',
                industry: '',
                stage: 'Ideation',
                fundingAsk: '',
                pitchDeckLink: '',
                services: [],
                whatsapp: ''
            });
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                window.scrollTo(0, 0);
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const user = auth.currentUser;
                    if (user) {
                        await db.collection('startups').doc(user.uid).set({
                            ...formData,
                            userId: user.uid,
                            updatedAt: new Date()
                        });
                        onComplete();
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const toggleService = (service) => {
                setFormData(prev => ({
                    ...prev,
                    services: prev.services.includes(service) 
                        ? prev.services.filter(s => s !== service)
                        : [...prev.services, service]
                }));
            };

            return (
                <div className="min-h-screen bg-black text-white font-inter pb-20">
                    <div className="px-4 sm:px-12 py-6 flex justify-between items-center max-w-7xl mx-auto w-full border-b border-white/5">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2L2 7L12 12L22 7L12 2Z" /></svg></div>
                            <span className="text-xl sm:text-2xl font-extrabold text-white tracking-tight">FundRise</span>
                        </div>
                        <h2 className="text-sm font-bold text-gray-500 uppercase tracking-widest hidden sm:block">Startup Onboarding</h2>
                        <button onClick={onBack} className="text-gray-500 hover:text-white transition font-bold text-sm">Skip for now</button>
                    </div>

                    <main className="max-w-4xl mx-auto px-4 pt-12 sm:pt-16">
                        <div className="mb-12">
                            <h1 className="text-3xl sm:text-4xl font-extrabold mb-4 tracking-tight">Tell us about your startup</h1>
                            <p className="text-gray-500 font-medium">Complete these details to start connecting with investors.</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-12">
                            {/* Basic Details */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-indigo-600/20 flex items-center justify-center text-indigo-500 font-bold text-sm">1</div>
                                    <h3 className="text-xl font-bold">Basic Details</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Startup Name</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={formData.startupName}
                                            onChange={(e) => setFormData({...formData, startupName: e.target.value})}
                                            placeholder="Enter startup name" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all" 
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Industry</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={formData.industry}
                                            onChange={(e) => setFormData({...formData, industry: e.target.value})}
                                            placeholder="e.g. Fintech, AI, Health" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all" 
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Startup Stage</label>
                                        <select 
                                            value={formData.stage}
                                            onChange={(e) => setFormData({...formData, stage: e.target.value})}
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all appearance-none"
                                        >
                                            <option>Ideation</option>
                                            <option>MVP</option>
                                            <option>Early Traction</option>
                                            <option>Scaling</option>
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">WhatsApp Support</label>
                                        <input 
                                            type="tel" 
                                            value={formData.whatsapp}
                                            onChange={(e) => setFormData({...formData, whatsapp: e.target.value})}
                                            placeholder="+91 00000 00000" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all" 
                                        />
                                    </div>
                                </div>
                            </section>

                            {/* Funding Ask */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-emerald-600/20 flex items-center justify-center text-emerald-500 font-bold text-sm">2</div>
                                    <h3 className="text-xl font-bold">Funding Ask</h3>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Total Funding Required (USD)</label>
                                    <input 
                                        type="text" 
                                        required
                                        value={formData.fundingAsk}
                                        onChange={(e) => setFormData({...formData, fundingAsk: e.target.value})}
                                        placeholder="e.g. $500,000" 
                                        className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all" 
                                    />
                                </div>
                            </section>

                            {/* Uploads */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-blue-600/20 flex items-center justify-center text-blue-500 font-bold text-sm">3</div>
                                    <h3 className="text-xl font-bold">Documents & Pitch Deck</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Pitch Deck Link</label>
                                        <input 
                                            type="url" 
                                            value={formData.pitchDeckLink}
                                            onChange={(e) => setFormData({...formData, pitchDeckLink: e.target.value})}
                                            placeholder="https://drive.google.com/..." 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all" 
                                        />
                                    </div>
                                    <div className="border-2 border-dashed border-white/5 rounded-2xl p-8 flex flex-col items-center justify-center text-center hover:border-blue-500 transition-all cursor-pointer">
                                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" className="text-gray-500 mb-4" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                        <p className="text-sm font-bold">Upload Company Documents</p>
                                        <p className="text-xs text-gray-500 mt-1">PDF, DOCX max 10MB</p>
                                    </div>
                                </div>
                            </section>

                            {/* Services */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-amber-600/20 flex items-center justify-center text-amber-500 font-bold text-sm">4</div>
                                    <h3 className="text-xl font-bold">Registration Services (Optional)</h3>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {['GST Registration', 'ITR Filing'].map(service => (
                                        <div 
                                            key={service}
                                            onClick={() => toggleService(service)}
                                            className={`p-6 rounded-2xl border-2 transition-all cursor-pointer flex justify-between items-center ${
                                                formData.services.includes(service) 
                                                    ? 'border-amber-500 bg-amber-500/5' 
                                                    : 'border-white/5 bg-[#111111] hover:border-white/10'
                                            }`}
                                        >
                                            <div>
                                                <h4 className="font-bold">{service}</h4>
                                                <p className="text-xs text-gray-500 mt-1">Professional assistance @ ₹2,499</p>
                                            </div>
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${
                                                formData.services.includes(service) ? 'border-amber-500 bg-amber-500' : 'border-white/20'
                                            }`}>
                                                {formData.services.includes(service) && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="4"><polyline points="20 6 9 17 4 12"/></svg>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <button 
                                disabled={loading}
                                className="w-full btn-primary py-6 rounded-2xl font-extrabold text-xl shadow-2xl shadow-indigo-600/20 transition-all disabled:opacity-50"
                            >
                                {loading ? 'Saving Profile...' : 'Complete Profile & Continue'}
                            </button>
                        </form>
                    </main>
                </div>
            );
        };

        const AdminLoginPage = ({ onBack, onSuccess }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handlePasswordLogin = (e) => {
                e.preventDefault();
                if (password === 'fundrise@123') {
                    onSuccess('admin');
                } else {
                    setError('Incorrect administrator password.');
                }
            };

            return (
                <div className="min-h-screen bg-black flex flex-col font-inter">
                    <div className="px-4 sm:px-12 py-6 flex justify-between items-center max-w-7xl mx-auto w-full">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={onBack}>
                            <div className="bg-rose-600 p-1.5 rounded-lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2L2 7L12 12L22 7L12 2Z" /></svg></div>
                            <span className="text-xl sm:text-2xl font-extrabold text-white tracking-tight">FundRise <span className="text-rose-500 ml-1 text-sm font-bold uppercase tracking-widest">Admin</span></span>
                        </div>
                        <button onClick={onBack} className="text-gray-500 hover:text-white transition font-bold text-sm">Cancel Access</button>
                    </div>

                    <main className="flex-1 flex flex-col items-center justify-center px-4 pb-20">
                        <div className="w-full max-w-md space-y-8">
                            <div className="text-center space-y-2">
                                <h1 className="text-3xl font-extrabold text-white tracking-tight">Admin Portal Access</h1>
                                <p className="text-gray-500 font-medium">Restricted area. Please authenticate to proceed.</p>
                            </div>

                            <div className="bg-[#0A0A0A] border border-rose-500/20 rounded-[32px] p-8 sm:p-10 shadow-2xl space-y-8">
                                {error && (
                                    <div className="p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-500 text-xs font-bold text-center">
                                        {error}
                                    </div>
                                )}

                                <form onSubmit={handlePasswordLogin} className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Admin Password</label>
                                        <input 
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}

                        <div className="mb-12">
                            <h1 className="text-3xl sm:text-4xl font-extrabold mb-4 tracking-tight">Setup your Investor Profile</h1>
                            <p className="text-gray-500 font-medium">Complete these details to start discovering high-growth startups.</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-12">
                            {/* Verification */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-indigo-600/20 flex items-center justify-center text-indigo-500 font-bold text-sm">1</div>
                                    <h3 className="text-xl font-bold">Identity Verification</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Aadhaar Number <span className="text-rose-500">*</span></label>
                                        <input 
                                            type="text" 
                                            required
                                            value={formData.aadhaar}
                                            onChange={(e) => setFormData({...formData, aadhaar: e.target.value})}
                                            placeholder="XXXX XXXX XXXX" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all" 
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">PAN Number <span className="text-rose-500">*</span></label>
                                        <input 
                                            type="text" 
                                            required
                                            value={formData.pan}
                                            onChange={(e) => setFormData({...formData, pan: e.target.value})}
                                            placeholder="ABCDE1234F" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-indigo-500 transition-all" 
                                        />
                                    </div>
                                </div>
                            </section>

                            {/* Preferences */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-emerald-600/20 flex items-center justify-center text-emerald-500 font-bold text-sm">2</div>
                                    <h3 className="text-xl font-bold">Investment Preferences</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Domain of Investment</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={formData.domain}
                                            onChange={(e) => setFormData({...formData, domain: e.target.value})}
                                            placeholder="e.g. SaaS, Fintech, Web3" 
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all" 
                                        />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">Ticket Size</label>
                                        <select 
                                            value={formData.ticketSize}
                                            onChange={(e) => setFormData({...formData, ticketSize: e.target.value})}
                                            className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-emerald-500 transition-all appearance-none"
                                        >
                                            <option>Under $50k</option>
                                            <option>$50k - $250k</option>
                                            <option>$250k - $1M</option>
                                            <option>$1M+</option>
                                        </select>
                                    </div>
                                </div>
                            </section>

                            {/* Contact */}
                            <section className="space-y-8">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-8 h-8 rounded-full bg-blue-600/20 flex items-center justify-center text-blue-500 font-bold text-sm">3</div>
                                    <h3 className="text-xl font-bold">Communication</h3>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-400 uppercase tracking-wider">WhatsApp Support</label>
                                    <input 
                                        type="tel" 
                                        required
                                        value={formData.whatsapp}
                                        onChange={(e) => setFormData({...formData, whatsapp: e.target.value})}
                                        placeholder="+91 00000 00000" 
                                        className="w-full bg-[#111111] border border-white/5 px-6 py-4 rounded-2xl focus:outline-none focus:border-blue-500 transition-all" 
                                    />
                                </div>
                            </section>

                            <button 
                                disabled={loading}
                                className="w-full btn-primary py-6 rounded-2xl font-extrabold text-xl shadow-2xl shadow-indigo-600/20 transition-all disabled:opacity-50"
                            >
                                {loading ? 'Saving Profile...' : 'Complete Profile & Continue'}
                            </button>
                        </form>
                    </main>
                </div>
            );
        };

        const InvestorDashboard = ({ onLogout }) => {
            const [investorData, setInvestorData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchInvestorData = async () => {
                    try {
                        const user = auth.currentUser;
                        if (user) {
                            const doc = await db.collection('investors').doc(user.uid).get();
                            if (doc.exists) {
                                setInvestorData(doc.data());
                            }
                        }
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setLoading(false);
                    }
                };
                fetchInvestorData();
            }, []);

            if (loading) return <div className="min-h-screen bg-black flex items-center justify-center"><div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>;

            const stats = [
                { label: "New Startups", value: "24", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>, color: "indigo" },
                { label: "Deals in Review", value: "8", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>, color: "blue" },
                { label: "Total Invested", value: "$0", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>, color: "emerald" },
                { label: "Network", value: "156", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>, color: "amber" }
            ];

            return (
                <div className="min-h-screen bg-black text-white font-inter">
                    <nav className="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-4 sm:px-8 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-1.5 rounded-lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2L2 7L12 12L22 7L12 2Z" /></svg></div>
                                <span className="text-xl sm:text-2xl font-extrabold text-white tracking-tight">FundRise</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={() => { auth.signOut(); onLogout(); }} className="bg-white/5 hover:bg-white/10 px-4 py-2 rounded-xl transition border border-white/5 font-bold text-sm">Logout</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-8 py-12 space-y-12">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <h1 className="text-4xl font-extrabold tracking-tight">Investor Dashboard</h1>
                                <p className="text-gray-500 font-medium mt-1">Discover the next unicorn in <span className="text-white">{investorData?.domain || 'your domain'}</span>.</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {stats.map((stat, i) => (
                                <div key={i} className="bg-[#111111] p-6 rounded-2xl border border-white/5">
                                    <div className={`p-2 rounded-xl bg-${stat.color}-500/10 text-${stat.color}-500 w-fit mb-4`}>{stat.icon}</div>
                                    <p className="text-xs font-bold text-gray-500 uppercase tracking-widest">{stat.label}</p>
                                    <h3 className="text-2xl font-extrabold mt-1">{stat.value}</h3>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-8">
                                <div className="bg-[#111111] rounded-[32px] border border-white/5 p-8">
                                    <h3 className="text-xl font-bold mb-8">Trending Startups</h3>
                                    <div className="space-y-6">
                                        {[
                                            { name: "EcoStream", domain: "Fintech", ask: "$500k", stage: "MVP" },
                                            { name: "Nebula AI", domain: "Artificial Intelligence", ask: "$1.2M", stage: "Scaling" },
                                            { name: "HealthPal", domain: "Healthcare", ask: "$250k", stage: "Seed" }
                                        ].map((startup, i) => (
                                            <div key={i} className="p-6 rounded-2xl bg-white/5 border border-white/5 flex justify-between items-center hover:border-indigo-500/50 transition-all cursor-pointer group">
                                                <div>
                                                    <h4 className="font-bold text-lg group-hover:text-indigo-500 transition-colors">{startup.name}</h4>
                                                    <p className="text-sm text-gray-500">{startup.domain} • {startup.stage}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-bold text-white">{startup.ask}</p>
                                                    <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest">Target Ask</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-8">
                                <div className="bg-[#111111] rounded-[32px] border border-white/5 p-8">
                                    <h3 className="text-lg font-bold mb-6">Profile Settings</h3>
                                    <div className="space-y-4">
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-500">Ticket Size:</span>
                                            <span className="font-bold">{investorData?.ticketSize}</span>
                                        </div>
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-500">Aadhaar:</span>
                                            <span className="font-bold text-emerald-500">Verified</span>
                                        </div>
                                        <div className="flex justify-between text-sm">
                                            <span className="text-gray-500">PAN:</span>
                                            <span className="font-bold text-emerald-500">Verified</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };
        const App = () => {
            const [view, setView] = useState('home');
            const [userRole, setUserRole] = useState('startup');
            const [checkingOnboarding, setCheckingOnboarding] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (user) => {
                    if (user) {
                        setCheckingOnboarding(true);
                        try {
                            const userDoc = await db.collection('users').doc(user.uid).get();
                            if (userDoc.exists) {
                                const role = userDoc.data().role;
                                setUserRole(role);
                                
                                if (role === 'startup') {
                                    const startupDoc = await db.collection('startups').doc(user.uid).get();
                                    if (startupDoc.exists) setView('dashboard');
                                    else setView('startup-onboarding');
                                } else if (role === 'investor') {
                                    const investorDoc = await db.collection('investors').doc(user.uid).get();
                                    if (investorDoc.exists) setView('dashboard');
                                    else setView('investor-onboarding');
                                } else {
                                    setView('home');
                                }
                            }
                        } catch (err) {
                            console.error("Auth state error:", err);
                        } finally {
                            setCheckingOnboarding(false);
                        }
                    } else {
                        setView('home');
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleAuth = (type, role) => {
                setUserRole(role);
                setView(type);
            };

            const handleAuthSuccess = async () => {
                const user = auth.currentUser;
                if (!user) return;

                setCheckingOnboarding(true);
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    const role = userDoc.data()?.role || userRole;
                    setUserRole(role);

                    if (role === 'startup') {
                        const startupDoc = await db.collection('startups').doc(user.uid).get();
                        if (startupDoc.exists) setView('dashboard');
                        else setView('startup-onboarding');
                    } else if (role === 'investor') {
                        const investorDoc = await db.collection('investors').doc(user.uid).get();
                        if (investorDoc.exists) setView('dashboard');
                        else setView('investor-onboarding');
                    } else {
                        setView('home');
                    }
                } catch (err) {
                    console.error("Onboarding check error:", err);
                    setView('home');
                } finally {
                    setCheckingOnboarding(false);
                }
            };

            if (checkingOnboarding) return <div className="min-h-screen bg-black flex items-center justify-center"><div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if (view === 'dashboard') {
                if (userRole === 'startup') return <StartupDashboard onLogout={() => setView('home')} />;
                if (userRole === 'investor') return <InvestorDashboard onLogout={() => setView('home')} />;
            }

            if (view === 'startup-onboarding') return (
                <StartupForm onBack={() => setView('home')} onComplete={() => setView('dashboard')} />
            );

            if (view === 'investor-onboarding') return (
                <InvestorForm onBack={() => setView('home')} onComplete={() => setView('dashboard')} />
            );

            if (view === 'admin-login') return (
                <AdminLoginPage onBack={() => setView('home')} onSuccess={(role) => { setUserRole(role); setView('admin-dashboard'); }} />
            );

            if (view === 'admin-dashboard') return (
                <AdminDashboard onLogout={() => setView('home')} />
            );

            if (view === 'login') return (
                <LoginPage role={userRole} onBack={() => setView('home')} onSignup={() => setView('signup')} onSuccess={handleAuthSuccess} />
            );

            if (view === 'signup') return (
                <SignUpPage role={userRole} onBack={() => setView('home')} onLogin={() => setView('login')} onSuccess={handleAuthSuccess} />
            );

            return (
                <div className="min-h-screen flex flex-col bg-black">
                    <Navbar onHome={() => setView('home')} />
                    <main className="flex-1">
                        <Hero />
                        <TrustedLogos />
                        <PlatformRoles onAuth={handleAuth} />
                        <HowItWorks />
                        <FeaturedStartups />
                        <CTA />
                    </main>
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
